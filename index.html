<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Клещевой энцефалит — Тест</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>
  <div class="container">

    <!-- HEADER -->
    <div class="header">
      <h1>🧠 Клещевой энцефалит</h1>
      <p>Тест знаний и защита здоровья</p>
    </div>

    <!-- START SCREEN -->
    <div id="startScreen" class="card">
      <h2>Тест: Клещевой энцефалит</h2>
      <input type="text" id="userName" class="input" placeholder="Введите ваше имя" style="width:100%; padding:18px; border:2px solid #e0f2f1; border-radius:16px; font-size:18px; margin:20px 0;">
      <button onclick="startQuiz()" class="btn btn-primary">Начать тест →</button>
    </div>

    <!-- QUIZ SCREEN -->
    <div id="quizScreen" class="card hidden">
      <h2>Вопрос <span id="qNum">1</span>/10</h2>
      <p id="questionText" style="font-size:19px; margin:25px 0; color:#1e2937; line-height:1.5;"></p>
      <div id="options"></div>
      <button id="nextBtn" onclick="nextQuestion()" class="btn btn-primary hidden">Далее →</button>
    </div>

    <!-- RESULT SCREEN -->
    <div id="resultScreen" class="card hidden">
      <h2>Результат для <span id="resultUser" style="color:#10b981;"></span></h2>
      <div id="scoreCircle" class="score-circle">0%</div>
      <p id="resultMsg" style="text-align:center; font-size:22px; margin:20px 0;"></p>
      <button onclick="restartQuiz()" class="btn btn-primary">Пройти заново</button>
    </div>

    <!-- ADMIN PANEL -->
    <div id="adminPanel">
      <div class="admin-header">
        <div style="display:flex; align-items:center; gap:12px;">
          <span class="emoji-3d">🔐</span>
          <strong>Админ-панель</strong>
        </div>
        <button onclick="loginAdmin()" style="background:#ef4444; color:white; border:none; padding:10px 20px; border-radius:12px; cursor:pointer;">Войти</button>
      </div>
      <div id="adminContent" class="admin-content hidden">
        <button onclick="exportToCSV()" class="btn" style="background:#10b981; margin-bottom:20px;">📥 Экспорт в CSV</button>
        <div id="adminResults">Загрузка результатов...</div>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
